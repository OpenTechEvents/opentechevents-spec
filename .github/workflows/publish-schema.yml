name: Publish @opentechevents/schema

# Publishes only on an explicit tag: git tag schema-v0.1.0 && git push --tags
# A published version is immutable — npm does not allow overwriting it, and neither does the spec.
#
# No token, no secret: npm trusted publishing (OIDC). npm is configured to trust this repo and
# this workflow file, and mints a short-lived credential for each run. Renaming this file or
# moving it to another repo breaks publishing by design — that is the point.
on:
  push:
    tags: ["schema-v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing and provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      # Node 20 ships npm 10; trusted publishing needs npm >= 11.5.1.
      - run: npm install -g npm@latest

      - run: npm ci

      # The examples are the gate: a schema that breaks its own examples never reaches npm.
      - run: npm run validate

      - name: Check the tag matches the package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#schema-v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag is $TAG_VERSION but package.json says $PKG_VERSION"
            exit 1
          fi

      # No NODE_AUTH_TOKEN: the credential comes from OIDC. Provenance is implied by trusted
      # publishing, and passed explicitly so a misconfiguration fails loudly instead of
      # silently publishing an unsigned package.
      - run: npm publish --provenance --access public
